name: Deploy .NET 8 API to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Download Source Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

# --- NEW STEP: The Quality Gate ---
      - name: Run Unit Tests
        run: |
          cd webApiLearn
          dotnet test
      # ----------------------------------

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=AmilkarDev_APIProducts
            -Dsonar.organization=amilkardev
            -Dsonar.sources=webApiLearn/ClientA.Api

      - name: Build and Publish
        run: |
          cd webApiLearn/ClientA.Api
          dotnet publish -c Release -o ../publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-client-a-dotnet-api-6cdc0q'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './webApiLearn/publish'
