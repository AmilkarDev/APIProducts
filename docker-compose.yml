version: '3.8'

services:
  # 1. The SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"

  seq:
    image: datalust/seq:latest
    environment:
    - ACCEPT_EULA=Y
    - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_PASSWORD}
    ports:
    - "5341:80"
  # 2. Your .NET API
  api:
    build: 
      context: ./webApiLearn/ClientA.Api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # This overrides your appsettings.json! It points to the 'db' container.
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=ClientADb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
      # Tell the .NET app where to send local logs
      - Seq__ServerUrl=http://seq
    depends_on:
      - db